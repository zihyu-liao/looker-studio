<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Credits</title>
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: DFKai-SB,Time New Roman, sans-serif;
    }

    .credits-container {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: black;
    }

    .credits {
      position: absolute;
      width: 100%;
      bottom: -100%;
      text-align: center;
      color: white;
      font-size: 32px;
      line-height: 1.8;
      animation: scrollUp 30s linear infinite;
      padding: 40px;
      box-sizing: border-box;
    }

    .title {
      font-size: 42px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .section {
      margin-top: 30px;
      font-size: 36px;
      font-weight: bold;
    }

    @keyframes scrollUp {
      0% {
        transform: translateY(30%);
      }
      100% {
        transform: translateY(-250%);
      }
    }
  </style>
</head>
<body>
  <div class="credits-container">
    <div class="credits">
      <div class="title">特別感謝以下單位與人員之協助</div>
        <div>社團法人中華民國醫事檢驗師公會全國聯合會</div>
        <div>雲林縣醫事檢驗師公會</div>
        <div>台中金典酒店 The Splendor Hotel-Taichung</div>
      <div>國立臺灣大學醫學院附設醫院雲林分院</div>
      <div>馬惠明院長</div>
      <div>檢驗醫學部謝月貞主任</div>
      <div>檢驗醫學部醫事檢驗師</div>
      <div>技術指導:陳沛涵</div>
      <div>統籌:張長裕、廖子瑀</div>
      <div>場控/機動人員:張長裕、廖子瑀、莊雅如</div>
      <div>主持人:李姵妍、林玟珊</div>
      <div>關主:顏歆霈、蔡雨蒨、梁弘文</div>
      <div>攝影師:陳裕仁</div>
    </div>
  </div>
</body>
</html>
